<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Progressive Paper Toss Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            touch-action: none;
            color: #fff;
        }

        #game-container {
            width: 95vw;
            max-width: 400px;
            background: #1e293b;
            border: 6px solid #334155;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #ui-layer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            color: #fff;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 900;
            z-index: 5;
            border-bottom: 2px solid #334155;
        }

        .stat-box {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #combo-badge {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
            animation: pulse 0.3s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        canvas {
            background: #f8fafc;
            display: block;
            width: 100%;
            height: auto;
        }

        #overlay {
            position: absolute;
            top: 50px;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 10;
        }

        h2 { color: #f59e0b; margin-bottom: 12px; font-size: 1.8rem; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; }

        .btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #047857;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #wind-banner {
            position: absolute;
            bottom: 150px;
            width: 100%;
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #475569;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div class="stat-box">🔥 Streak: <span id="streak-display">0</span></div>
            <div class="stat-box">
                <span id="combo-badge">BURNING</span>
                🏆 Best: <span id="best-display">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="530"></canvas>
        
        <div id="wind-banner">💨 Wind: <span id="wind-text">CALM</span></div>

        <div id="overlay">
            <h2 id="title-text">🗑️ DYNAMIC TOSS 📄</h2>
            <p id="body-text">Starts completely easy with zero wind and a still target! Land consecutive buckets to increase difficulty, unlock wind currents, and make the basket move!</p>
            <button class="btn" id="action-btn" onclick="startGame()">START TOSSING</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let highscore = 0;
        let streakCount = 0;
        let gameRunning = false;

        // Visual juice queues
        let particles = [];
        let floaters = [];
        let screenShake = 0;

        let windForce = 0;
        let windDirection = 0;

        // Trash Bin Engine Configuration
        const bin = { 
            x: 165, 
            y: 110, 
            width: 70, 
            height: 85, 
            currentDirection: 1,
            baseSpeed: 1.8
        };
        
        const ballDefault = { x: 200, y: 460, radius: 25, size: 25 };
        let ball = { ...ballDefault, vx: 0, vy: 0, isThrown: false, scale: 1 };

        let touchStart = { x: 0, y: 0 };
        let touchCurrent = { x: 0, y: 0 };
        let isDragging = false;

        const hypeWords = ["NICE!", "SWISH!", "EASY!", "UNSTOPPABLE!", "GODLIKE!", "MONSTER!"];

        canvas.addEventListener('pointerdown', (e) => {
            if (!gameRunning || ball.isThrown) return;
            const rect = canvas.getBoundingClientRect();
            const clickX = ((e.clientX - rect.left) / rect.width) * canvas.width;
            const clickY = ((e.clientY - rect.top) / rect.height) * canvas.height;

            if (Math.hypot(clickX - ball.x, clickY - ball.y) < ball.radius * 1.8) {
                isDragging = true;
                touchStart = { x: clickX, y: clickY };
                touchCurrent = { x: clickX, y: clickY };
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            touchCurrent.x = ((e.clientX - rect.left) / rect.width) * canvas.width;
            touchCurrent.y = ((e.clientY - rect.top) / rect.height) * canvas.height;
        });

        canvas.addEventListener('pointerup', () => {
            if (!isDragging) return;
            isDragging = false;

            let dx = touchCurrent.x - touchStart.x;
            let dy = touchCurrent.y - touchStart.y;

            if (dy < -20) {
                ball.vx = dx * 0.065;
                ball.vy = dy * 0.075;
                ball.isThrown = true;
            }
        });

        function adjustEnvironmentDifficulty() {
            // Level 1: Under 3 Streak -> Zero wind, basket stationary in middle
            if (streakCount < 3) {
                windForce = 0;
                document.getElementById('wind-text').innerText = "CALM";
                document.getElementById('combo-badge').style.display = 'none';
            } 
            // Level 2: 3-6 Streak -> Small wind introduced, basket begins moving slowly
            else if (streakCount >= 3 && streakCount < 7) {
                windDirection = Math.random() < 0.5 ? -1 : 1;
                windForce = 0.04 + (Math.random() * 0.04);
                renderWindUI();
                showBadge("🔥 ON FIRE");
            } 
            // Level 3: 7+ Streak -> Chaotic speed-slashing winds and fast moving basket
            else {
                windDirection = Math.random() < 0.5 ? -1 : 1;
                windForce = 0.09 + (Math.random() * 0.08);
                renderWindUI();
                showBadge("👑 UNSTOPPABLE");
            }
        }

        function renderWindUI() {
            let displayForce = Math.round(windForce * 125);
            let arrow = windDirection > 0 ? "▶" : "◀";
            document.getElementById('wind-text').innerText = `${arrow} ${displayForce} KM/H`;
        }

        function showBadge(text) {
            const badge = document.getElementById('combo-badge');
            badge.innerText = text;
            badge.style.display = 'inline-block';
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            score = 0;
            streakCount = 0;
            particles = [];
            floaters = [];
            bin.x = 165;
            document.getElementById('streak-display').innerText = streakCount;
            resetBall();
            gameRunning = true;
        }

        function resetBall() {
            ball.x = ballDefault.x;
            ball.y = ballDefault.y;
            ball.vx = 0;
            ball.vy = 0;
            ball.scale = 1;
            ball.radius = ballDefault.radius;
            ball.isThrown = false;
            adjustEnvironmentDifficulty();
        }

        function spawnCelebrationParticles(x, y) {
            const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#a855f7'];
            let count = 15 + (streakCount * 4);
            
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 7,
                    vy: (Math.random() - 0.7) * 8,
                    radius: Math.random() * 4 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    decay: Math.random() * 0.02 + 0.015
                });
            }
        }

        function triggerRewardText(x, y, txt, color = '#3b82f6') {
            floaters.push({
                x: x,
                y: y,
                text: txt,
                color: color,
                size: '22px',
                alpha: 1,
                vy: -1.5
            });
        }

        function updateEngineLoop() {
            if (gameRunning) {
                ctx.save();
                if (screenShake > 0) {
                    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                    screenShake *= 0.85;
                    if (screenShake < 0.5) screenShake = 0;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Floor Graphic
                let floorGrad = ctx.createLinearGradient(0, 150, 0, canvas.height);
                floorGrad.addColorStop(0, '#cbd5e1');
                floorGrad.addColorStop(1, '#94a3b8');
                ctx.fillStyle = floorGrad;
                ctx.fillRect(0, 150, canvas.width, canvas.height - 150);
                ctx.fillStyle = '#64748b';
                ctx.fillRect(0, 146, canvas.width, 4);

                // Basket Motion Logic: Only move back and forth if streak is 3 or greater
                if (streakCount >= 3) {
                    let currentDynamicSpeed = bin.baseSpeed + (streakCount * 0.25);
                    bin.x += currentDynamicSpeed * bin.currentDirection;
                    
                    // Bounce away from edge boundaries safely
                    if (bin.x < 25) {
                        bin.x = 25;
                        bin.currentDirection = 1;
                    } else if (bin.x > 305) {
                        bin.x = 305;
                        bin.currentDirection = -1;
                    }
                }

                // Back rim rim architecture
                ctx.fillStyle = '#1e293b';
                ctx.beginPath();
                ctx.ellipse(bin.x + (bin.width/2), bin.y, bin.width/2, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                if (ball.isThrown) {
                    ball.vx += windForce * windDirection * 0.15;
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    ball.vy += 0.3;

                    ball.scale = Math.max(0.38, ball.scale - 0.022);
                    ball.radius = ballDefault.size * ball.scale;

                    // Expanded collision hitbox threshold mapping for beginner loops
                    if (ball.vy >= 0 && ball.y >= bin.y - 12 && ball.y <= bin.y + 36) {
                        let binCenterX = bin.x + (bin.width / 2);
                        let allowance = (bin.width / 2) + 6; // Gracious early layout spacing tolerance

                        if (Math.abs(ball.x - binCenterX) < allowance) {
                            streakCount++;
                            document.getElementById('streak-display').innerText = streakCount;

                            screenShake = 6 + (streakCount * 1.5);
                            spawnCelebrationParticles(ball.x, bin.y + 10);
                            
                            let word = hypeWords[Math.min(hypeWords.length - 1, Math.floor(streakCount / 2))];
                            triggerRewardText(binCenterX, bin.y - 30, word, '#10b981');
                            triggerRewardText(binCenterX, bin.y + 10, `🔥 STREAK ${streakCount}`, '#f59e0b');

                            resetBall();
                        }
                    }

                    if (ball.y > canvas.height + 50 || ball.x < -50 || ball.x > canvas.width + 50) {
                        endGame();
                    }
                }

                // Front structure wall grid plate
                let binGrad = ctx.createLinearGradient(bin.x, bin.y, bin.x + bin.width, bin.y);
                binGrad.addColorStop(0, '#475569');
                binGrad.addColorStop(0.5, '#64748b');
                binGrad.addColorStop(1, '#334155');
                ctx.fillStyle = binGrad;
                ctx.beginPath();
                ctx.moveTo(bin.x, bin.y);
                ctx.lineTo(bin.x + 8, bin.y + bin.height);
                ctx.lineTo(bin.x + bin.width - 8, bin.y + bin.height);
                ctx.lineTo(bin.x + bin.width, bin.y);
                ctx.closePath();
                ctx.fill();

                // Vector dragging line render
                if (isDragging) {
                    ctx.strokeStyle = '#10b981';
                    ctx.lineWidth = 5;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(ball.x, ball.y);
                    ctx.lineTo(ball.x - (touchCurrent.x - touchStart.x), ball.y - (touchCurrent.y - touchStart.y));
                    ctx.stroke();
                }

                // Core Projectile Object Display
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Render Active Burst Particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.alpha -= p.decay;
                    if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }

                // Render Float Strings Text Tags
                for (let i = floaters.length - 1; i >= 0; i--) {
                    let f = floaters[i];
                    f.y += f.vy; f.alpha -= 0.02;
                    if (f.alpha <= 0) { floaters.splice(i, 1); continue; }
                    ctx.save(); ctx.globalAlpha = f.alpha; ctx.fillStyle = f.color;
                    ctx.font = `900 ${f.size} 'Segoe UI', sans-serif`; ctx.textAlign = 'center';
                    ctx.fillText(f.text, f.x, f.y); ctx.restore();
                }

                ctx.restore();
            }
            requestAnimationFrame(updateEngineLoop);
        }

        function endGame() {
            gameRunning = false;
            if (streakCount > highscore) {
                highscore = streakCount;
                document.getElementById('best-display').innerText = highscore;
            }
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('title-text').innerText = "🔴 STREAK ENDED! 🔴";
            document.getElementById('body-text').innerText = `The paper missed the bin!\n\nMax Peak Streak Hit: ${streakCount}`;
            document.getElementById('action-btn').innerText = "RESET FISHING NET";
        }

        requestAnimationFrame(updateEngineLoop);
    </script>
</body>
</html>
